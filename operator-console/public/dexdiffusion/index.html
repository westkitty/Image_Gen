<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DexDiffusion</title>
  <link rel="icon" href="uploads/grok_image_1775518226929.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{height:100%;overflow:hidden;margin:0;padding:0}
    textarea{resize:none}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(148,163,184,.2);border-radius:2px}
    summary{cursor:pointer;user-select:none;list-style:none}
    summary::-webkit-details-marker{display:none}
    [data-v="1"] [data-nav][data-active="true"]{background:rgba(56,189,248,.11)!important;border-left-color:#38bdf8!important;color:#e8f0f7!important}
    [data-v="2"] [data-tab][data-active="true"]{color:#fde68a!important;border-bottom-color:#f59e0b!important}
    [data-v="3"] [data-rail][data-active="true"]{color:#a78bfa!important}
    [data-v="3"] [data-rail][data-active="true"] [data-railbar]{background:#a78bfa!important}
    [data-vbtn][data-active="true"]{border-color:rgba(255,255,255,.28)!important;color:#e0e0f0!important;background:rgba(255,255,255,.07)!important}
    input,select,textarea{color-scheme:dark}
    input[type=number]::-webkit-inner-spin-button{opacity:.4}
  </style>
</head>
<body>
  <div id="app-root"></div>
  <template id="dc-template">
<div data-v="{{ versionStr }}" style="height:100dvh;display:flex;flex-direction:column;overflow:hidden;background:#08080c;font-family:'DM Sans',system-ui,sans-serif;color:#e2e2e8;">
  <div style="height:40px;background:#08080c;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;padding:0 14px;gap:6px;flex-shrink:0;">
    <img src="uploads/grok_image_1775518226929.jpg" style="width:20px;height:20px;border-radius:4px;object-fit:cover;object-position:center 24%;opacity:.55;" alt="" />
    <span style="font-size:10px;color:#6060a0;letter-spacing:.12em;text-transform:uppercase;font-weight:700;">DexDiffusion</span>
    <span style="font-size:10px;color:#40406a;letter-spacing:.06em;">· Corrected Reworks</span>
    <div style="flex:1;"></div>
    <div style="display:flex;gap:3px;">
      <button data-vbtn="1" data-active="{{ isV1Str }}" onClick="{{ setV1 }}" style="border:1px solid rgba(255,255,255,.1);background:transparent;color:#7070a8;border-radius:6px;padding:4px 13px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">V1 · Console</button>
      <button data-vbtn="2" data-active="{{ isV2Str }}" onClick="{{ setV2 }}" style="border:1px solid rgba(255,255,255,.1);background:transparent;color:#7070a8;border-radius:6px;padding:4px 13px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">V2 · Studio</button>
      <button data-vbtn="3" data-active="{{ isV3Str }}" onClick="{{ setV3 }}" style="border:1px solid rgba(255,255,255,.1);background:transparent;color:#7070a8;border-radius:6px;padding:4px 13px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">V3 · Focus</button>
    </div>
  </div>
  <div style="flex:1;min-height:0;overflow:hidden;">
<sc-if value="{{ isV1 }}" hint-placeholder-val="{{ true }}">
<div style="display:grid;grid-template-columns:258px 1fr;height:100%;background:#080c12;">
  <aside style="background:#060a10;border-right:1px solid rgba(148,163,184,.12);display:flex;flex-direction:column;overflow:hidden;">
    <div style="padding:14px 14px 12px;border-bottom:1px solid rgba(148,163,184,.1);flex-shrink:0;">
      <div style="display:flex;gap:11px;align-items:center;margin-bottom:12px;">
        <div style="width:52px;height:52px;border-radius:14px;overflow:hidden;flex-shrink:0;border:2px solid rgba(56,189,248,.3);"><img src="uploads/grok_image_1775521844329.jpg" style="width:100%;height:100%;object-fit:cover;object-position:center 28%;" alt="Dexter" /></div>
        <div><div style="font-size:16px;font-weight:700;color:#f0f4f8;letter-spacing:-.02em;">DexDiffusion</div><div style="font-size:11px;color:#6090a8;margin-top:1px;">Local Image Gen</div></div>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:4px;background:{{ backendChipBg }};border:1px solid {{ backendChipBorder }};border-radius:5px;padding:3px 8px;"><span style="width:5px;height:5px;border-radius:99px;background:{{ backendDot }};flex-shrink:0;"></span><span style="font-size:10px;color:{{ backendDot }};font-weight:600;">{{ backendLabel }}</span></div>
        <div style="display:flex;align-items:center;gap:4px;background:{{ jobChipBg }};border:1px solid {{ jobChipBorder }};border-radius:5px;padding:3px 8px;"><span style="width:5px;height:5px;border-radius:99px;background:{{ jobDot }};flex-shrink:0;"></span><span style="font-size:10px;color:{{ jobDot }};font-weight:600;">{{ jobLabel }}</span></div>
      </div>
    </div>
    <nav style="flex:1;min-height:0;overflow-y:auto;padding:10px 8px;">
      <div style="font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#4e7090;font-weight:700;padding:8px 8px 4px;">Generate</div>
      <button data-nav="true" data-active="{{ isCreateStr }}" onClick="{{ navCreate }}" style="width:100%;border:none;border-left:2px solid transparent;background:transparent;color:#6a8090;border-radius:0 8px 8px 0;padding:8px 10px 8px 12px;text-align:left;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;display:block;">Create</button><button data-nav="true" data-active="{{ isBatchStr }}" onClick="{{ navBatch }}" style="width:100%;border:none;border-left:2px solid transparent;background:transparent;color:#6a8090;border-radius:0 8px 8px 0;padding:8px 10px 8px 12px;text-align:left;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;display:block;">Batch / Sweep</button>
      <div style="font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#4e7090;font-weight:700;padding:12px 8px 4px;">Library</div>
      <button data-nav="true" data-active="{{ isLibraryStr }}" onClick="{{ navLibrary }}" style="width:100%;border:none;border-left:2px solid transparent;background:transparent;color:#6a8090;border-radius:0 8px 8px 0;padding:8px 10px 8px 12px;text-align:left;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;display:block;">Library</button>
      <div style="font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#4e7090;font-weight:700;padding:12px 8px 4px;">Tools</div>
      <button data-nav="true" data-active="{{ isEditStr }}" onClick="{{ navEdit }}" style="width:100%;border:none;border-left:2px solid transparent;background:transparent;color:#6a8090;border-radius:0 8px 8px 0;padding:8px 10px 8px 12px;text-align:left;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;display:block;">Edit (img2img)</button><button data-nav="true" data-active="{{ isEnhanceStr }}" onClick="{{ navEnhance }}" style="width:100%;border:none;border-left:2px solid transparent;background:transparent;color:#6a8090;border-radius:0 8px 8px 0;padding:8px 10px 8px 12px;text-align:left;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;display:block;">Enhance</button>
      <div style="font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#4e7090;font-weight:700;padding:12px 8px 4px;">System</div>
      <button data-nav="true" data-active="{{ isModelsStr }}" onClick="{{ navModels }}" style="width:100%;border:none;border-left:2px solid transparent;background:transparent;color:#6a8090;border-radius:0 8px 8px 0;padding:8px 10px 8px 12px;text-align:left;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;display:block;">Models</button><button data-nav="true" data-active="{{ isSystemStr }}" onClick="{{ navSystem }}" style="width:100%;border:none;border-left:2px solid transparent;background:transparent;color:#6a8090;border-radius:0 8px 8px 0;padding:8px 10px 8px 12px;text-align:left;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;display:block;">System</button>
    </nav>
    <div style="border-top:1px solid rgba(148,163,184,.1);padding:10px 14px;flex-shrink:0;">
      <label style="display:flex;gap:7px;align-items:center;color:#6090a8;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;"><input type="checkbox" checked="{{ savePrompts }}" onChange="{{ onSavePrompts }}" style="width:auto;accent-color:#38bdf8;" /> Save prompts</label>
    </div>
  </aside>
  <div style="display:flex;flex-direction:column;min-width:0;overflow:hidden;background:#080c12;">
    <sc-if value="{{ isCreate }}" hint-placeholder-val="{{ true }}">
  <div style="display:grid;grid-template-columns:minmax(300px,410px) 1fr;height:100%;">
    <div style="background:#060a10;border-right:1px solid rgba(148,163,184,.1);display:flex;flex-direction:column;overflow:hidden;">
      <div style="flex-shrink:0;padding:10px 14px;border-bottom:1px solid rgba(148,163,184,.12);background:#060a10;">
        <button onClick="{{ onGenerate }}" style="width:100%;background:{{ genBg1 }};color:#040c12;border:0;font-weight:800;border-radius:9px;padding:12px;cursor:{{ genCursor }};font-size:15px;font-family:'DM Sans',sans-serif;transition:opacity .2s;opacity:{{ genOpacity }};">{{ generateLabel }}</button>
      </div>
      <div style="flex:1;min-height:0;overflow-y:auto;padding:14px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
          <div><div style="font-size:10px;color:#6090a8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">Target</div><select style="width:100%;border:1px solid rgba(148,163,184,.16);background:#091420;color:#e8f0f7;border-radius:7px;padding:7px;outline:none;font-size:12px;font-family:'DM Sans',sans-serif;" value="{{ target }}" onChange="{{ onTargetChange }}"><option value="sd15">controlled-sd15</option><option value="sdxl-base">controlled-sdxl-base</option><option value="sdxl-turbo">controlled-sdxl-turbo</option><option value="flux-fp8">controlled-flux-fp8</option></select></div>
          <div><div style="font-size:10px;color:#6090a8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">Preset</div><select style="width:100%;border:1px solid rgba(148,163,184,.16);background:#091420;color:#e8f0f7;border-radius:7px;padding:7px;outline:none;font-size:12px;font-family:'DM Sans',sans-serif;"><option>Fast (SD1.5)</option><option>Smoke test</option><option>Custom</option></select></div>
        </div>
        
                <div style="margin-bottom:12px;">
                  <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
                    <div style="font-size:11px;font-weight:600;color:#92a4b8;letter-spacing:.06em;text-transform:uppercase;">Prompt</div>
                    <span style="font-size:10px;color:#6090a8;">{{ promptLen }} chars</span>
                  </div>
                  <textarea rows="5" value="{{ prompt }}" onChange="{{ onPromptChange }}" placeholder="Describe the image. A1111 syntax supported." style="width:100%;border:1px solid rgba(148,163,184,.16);background:#141418;color:#e8f0f7;border-radius:8px;padding:10px;outline:none;font-size:13px;font-family:'DM Sans',sans-serif;line-height:1.5;display:block;"></textarea>
                </div>
                <div style="margin-bottom:12px;">
                  <div style="font-size:11px;font-weight:600;color:#92a4b8;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;">Negative</div>
                  <textarea rows="2" value="{{ negPrompt }}" onChange="{{ onNegChange }}" placeholder="low quality, blurry…" style="width:100%;border:1px solid rgba(148,163,184,.16);background:#141418;color:#e8f0f7;border-radius:8px;padding:9px;outline:none;font-size:13px;font-family:'DM Sans',sans-serif;display:block;"></textarea>
                </div>
                <div style="font-size:10px;font-weight:700;color:#4e7090;letter-spacing:.1em;text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid #4e7090;margin-bottom:10px;">Parameters</div>
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;">
                  <div><div style="font-size:10px;color:#6090a8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;">Steps</div><input type="number" value="{{ steps }}" onChange="{{ onStepsChange }}" min="1" max="150" style="width:100%;border:1px solid rgba(148,163,184,.16);background:#141418;color:#e8f0f7;border-radius:7px;padding:7px;outline:none;font-size:12px;" /></div>
                  <div><div style="font-size:10px;color:#6090a8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;">CFG</div><input type="number" value="{{ cfg }}" onChange="{{ onCfgChange }}" step="0.5" min="1" max="30" style="width:100%;border:1px solid rgba(148,163,184,.16);background:#141418;color:#e8f0f7;border-radius:7px;padding:7px;outline:none;font-size:12px;" /></div>
                  <div><div style="font-size:10px;color:#6090a8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;">Seed</div><input value="{{ seed }}" onChange="{{ onSeedChange }}" placeholder="-1" style="width:100%;border:1px solid rgba(148,163,184,.16);background:#141418;color:#e8f0f7;border-radius:7px;padding:7px;outline:none;font-size:12px;" /></div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
                  <div><div style="font-size:10px;color:#6090a8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;">Sampler</div><select style="width:100%;border:1px solid rgba(148,163,184,.16);background:#141418;color:#e8f0f7;border-radius:7px;padding:7px;outline:none;font-size:12px;font-family:'DM Sans',sans-serif;" value="{{ sampler }}" onChange="{{ onSamplerChange }}"><option>euler_a</option><option>euler</option><option>dpm++ 2m</option><option>dpm++ sde</option></select></div>
                  <div><div style="font-size:10px;color:#6090a8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;">Scheduler</div><select style="width:100%;border:1px solid rgba(148,163,184,.16);background:#141418;color:#e8f0f7;border-radius:7px;padding:7px;outline:none;font-size:12px;font-family:'DM Sans',sans-serif;" value="{{ scheduler }}" onChange="{{ onSchedulerChange }}"><option>discrete</option><option>karras</option><option>exponential</option></select></div>
                </div>
                <div style="margin-bottom:12px;">
                  <div style="font-size:10px;color:#6090a8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;">Dimensions</div>
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:5px;">
                    <input type="number" value="{{ width }}" onChange="{{ onWidthChange }}" step="8" placeholder="W" style="width:100%;border:1px solid rgba(148,163,184,.16);background:#141418;color:#e8f0f7;border-radius:7px;padding:7px;outline:none;font-size:12px;" />
                    <input type="number" value="{{ height }}" onChange="{{ onHeightChange }}" step="8" placeholder="H" style="width:100%;border:1px solid rgba(148,163,184,.16);background:#141418;color:#e8f0f7;border-radius:7px;padding:7px;outline:none;font-size:12px;" />
                  </div>
                  <div style="display:flex;gap:5px;">
                    <button onClick="{{ setDim512 }}" style="border:1px solid rgba(148,163,184,.16);background:transparent;color:#6090a8;border-radius:5px;padding:3px 7px;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif;">512×512</button>
                    <button onClick="{{ setDim768 }}" style="border:1px solid rgba(148,163,184,.16);background:transparent;color:#6090a8;border-radius:5px;padding:3px 7px;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif;">768×512</button>
                    <button onClick="{{ setDim1024 }}" style="border:1px solid rgba(148,163,184,.16);background:transparent;color:#6090a8;border-radius:5px;padding:3px 7px;font-size:10px;cursor:pointer;font-family:'DM Sans',sans-serif;">1024×1024</button>
                  </div>
                </div>
        <details style="border:1px solid rgba(148,163,184,.12);border-radius:7px;margin-bottom:7px;overflow:hidden;"><summary style="padding:8px 11px;font-size:12px;font-weight:600;color:#92a4b8;background:rgba(9,20,32,.6);">Extra networks</summary><div style="padding:11px;display:grid;gap:7px;"><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;"><div><div style="font-size:10px;color:#6090a8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;">VAE</div><select style="width:100%;border:1px solid rgba(148,163,184,.16);background:#091420;color:#e8f0f7;border-radius:7px;padding:7px;outline:none;font-size:12px;font-family:'DM Sans',sans-serif;"><option>Default</option><option>vae-ft-mse.safetensors</option></select></div><div><div style="font-size:10px;color:#6090a8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;">LoRA</div><select disabled style="width:100%;border:1px solid rgba(148,163,184,.1);background:#091420;color:#4a5a6a;border-radius:7px;padding:7px;outline:none;font-size:12px;opacity:.5;font-family:'DM Sans',sans-serif;"><option>— none —</option></select></div></div></div></details>
        <details style="border:1px solid rgba(148,163,184,.12);border-radius:7px;margin-bottom:7px;overflow:hidden;"><summary style="padding:8px 11px;font-size:12px;font-weight:600;color:#92a4b8;background:rgba(9,20,32,.6);">Hires · faces · tiling · routing</summary><div style="padding:11px;display:grid;gap:8px;"><div style="display:flex;gap:10px;flex-wrap:wrap;"><label style="display:flex;gap:5px;align-items:center;font-size:12px;color:#6090a8;cursor:pointer;font-family:'DM Sans',sans-serif;"><input type="checkbox" disabled style="width:auto;" /> Hires Fix</label><label style="display:flex;gap:5px;align-items:center;font-size:12px;color:#6090a8;cursor:pointer;font-family:'DM Sans',sans-serif;"><input type="checkbox" disabled style="width:auto;" /> Restore faces</label><label style="display:flex;gap:5px;align-items:center;font-size:12px;color:#6090a8;cursor:pointer;font-family:'DM Sans',sans-serif;"><input type="checkbox" style="width:auto;" /> Tiling</label></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;"><div><div style="font-size:10px;color:#6090a8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;">Mode</div><select style="width:100%;border:1px solid rgba(148,163,184,.16);background:#091420;color:#e8f0f7;border-radius:7px;padding:7px;outline:none;font-size:12px;font-family:'DM Sans',sans-serif;"><option>Server</option><option>CLI</option></select></div><div><div style="font-size:10px;color:#6090a8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;">API</div><select style="width:100%;border:1px solid rgba(148,163,184,.16);background:#091420;color:#e8f0f7;border-radius:7px;padding:7px;outline:none;font-size:12px;font-family:'DM Sans',sans-serif;"><option>SDAPI</option><option>OpenAI</option><option>Both</option><option>Native</option></select></div></div></div></details>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;background:#080c12;">
      <div style="flex:1;display:grid;place-items:center;position:relative;overflow:hidden;">
        
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;">
          <div style="width:260px;height:260px;border:1px dashed rgba(56,189,248,.15);position:relative;">
            <div style="position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(56,189,248,.05);"></div>
            <div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(56,189,248,.05);"></div>
            <div style="position:absolute;top:-18px;left:0;font-size:10px;color:rgba(56,189,248,.4);font-family:'IBM Plex Mono',monospace;">{{ width }}×{{ height }}</div>
          </div>
        </div>
        
        <sc-if value="{{ showJobResult }}" hint-placeholder-val="{{ false }}">
          <div style="position:relative;z-index:2;display:flex;align-items:center;justify-content:center;width:100%;height:100%;padding:20px;">{{ imageDisplay }}</div>
        </sc-if>
        <sc-if value="{{ jobIdle }}" hint-placeholder-val="{{ true }}"><div style="text-align:center;position:relative;z-index:1;padding:20px;"><div style="width:72px;height:72px;margin:0 auto 14px;border-radius:18px;overflow:hidden;opacity:.45;"><img src="uploads/grok_image_1775518716150.jpg" style="width:100%;height:100%;object-fit:cover;object-position:center 28%;" alt="" /></div><div style="font-size:13px;color:#6888a8;line-height:1.7;">No image yet.<br/>Press Generate and<br/>Dexter will press the button.</div></div></sc-if>
      </div>
      <div style="border-top:1px solid rgba(148,163,184,.1);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;background:#060a10;">
        <div style="border:1px solid rgba(148,163,184,.12);border-radius:5px;padding:4px 10px;font-size:11px;color:#6888a8;font-family:'IBM Plex Mono',monospace;">{{ actionStatus }}</div>
        <div style="flex:1;"></div>
        <button onClick="{{ onCopyParams }}" style="border:1px solid rgba(148,163,184,.16);background:transparent;color:#6090a8;border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;">Copy params</button>
        <button onClick="{{ onReuseLastSeed }}" style="border:1px solid rgba(148,163,184,.16);background:transparent;color:#6090a8;border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;">Reuse seed</button>
        <button onClick="{{ goToImg2img }}" style="border:1px solid rgba(148,163,184,.16);background:transparent;color:#6090a8;border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;">→ img2img</button>
      </div>
    </div>
  </div>
</sc-if>
    <sc-if value="{{ isLibrary }}" hint-placeholder-val="{{ false }}">
